# Gladiator configuration file
# All fields have sensible defaults; override as needed.

[topics]
log = "gladiator:log"
input = "gladiator:input"
agent_in = "agent:in"
agent_out = "agent:out"
agent_stream = "agent:stream"
llm_in = "llm:in"
llm_out = "llm:out"
llm_stream = "llm:stream"
llm_stats = "llm:stats"
llm_tool_calls = "llm:tool_calls"
tool_results = "tool:results"
user_control = "user:control"
ui_user = "ui:user"
ui_input = "ui:input"
agent_state_control = "agent:state_control"
agent_state = "agent:state"
persistence_command = "persistence:command"
persistence_response = "persistence:response"

[server]
host = "127.0.0.1"
port = 3000

[ui]
show_bottom_panel = true
theme = "dark"

[llm]
model = "custom/glm-5.2"
base_url = "http://ts-agent-gateway:4000/v1"
api_key = ""
temperature = 0.7
max_tokens = 65536
request_timeout_secs = 120
stream_timeout_secs = 300
max_retries = 3
retry_base_delay_ms = 500

[agent]
max_iterations = 50
working_dir = "."
system_message = "You are gladiator, an autonomous coding agent. You write code, run tests, and iterate until tests pass. Use the tools available to you to explore the codebase, make edits, run builds, and verify your work."

[tools]
bash = true
read = true
write = true
edit = true
glob = true
grep = true

# MCP tool servers — external tool servers spawned as child processes.
# Servers that duplicate built-in tools (read_file, write_file, edit_file, bash, glob, grep)
# are omitted; only servers providing unique tools are included here.

[mcp_servers.mcp-file-edit]
command = ["/Users/ayourtch/rust/mcp-file-edit/target/release/mcp-file-edit"]
default = false
expose = ["plan_edits", "apply_edit_plan"]

[mcp_servers.mcp-find-files]
command = ["/Users/ayourtch/rust/mcp-find-files/target/release/mcp-find-files"]
default = true
expose = []

[mcp_servers.mcp-run-command]
command = ["/Users/ayourtch/rust/mcp-run-command/target/release/mcp-run-command"]
default = true
expose = []

[mcp_servers.mcp-count-word-letters]
command = ["/Users/ayourtch/rust/mcp-count-word-letters/target/release/mcp-count-word-letters"]
default = true
expose = []

[mcp_servers.mcp-pty-server]
command = ["/Users/ayourtch/rust/mcp-pty-server/target/release/mcp-pty-server"]
default = true
expose = []

[mcp_servers.mcp-random]
command = ["/Users/ayourtch/rust/mcp-random/target/release/mcp-random"]
default = true
expose = []
